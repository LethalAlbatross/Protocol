<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROTOCOL UPDATER</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0e0e0e;color:#c8c8c8;font-family:'Courier New',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:30px 20px}
h1{font-size:13px;letter-spacing:4px;color:#e07830;margin-bottom:6px}
.sub{font-size:10px;color:#666;letter-spacing:2px;margin-bottom:30px}
.btn{width:100%;max-width:320px;padding:18px;background:#e07830;border:none;border-radius:4px;color:#000;font-size:12px;font-weight:900;letter-spacing:3px;font-family:'Courier New',monospace;margin-bottom:12px}
.btn:disabled{opacity:0.4}
.btn-sec{background:#141414;border:1px solid #333;color:#888}
.status{width:100%;max-width:320px;background:#141414;border:1px solid #2a2a2a;border-radius:4px;padding:14px;font-size:10px;line-height:1.8;min-height:60px;color:#888;margin-bottom:12px;display:none}
.status.show{display:block}
.ok{color:#4aaa4a}.err{color:#cc4444}.info{color:#e07830}
textarea,input{width:100%;max-width:320px;background:#141414;border:1px solid #2a2a2a;border-radius:4px;padding:12px;color:#ccc;font-size:12px;font-family:'Courier New',monospace;resize:none;outline:none;margin-bottom:12px;display:block}
textarea{height:80px;font-size:9px;color:#888}
label{font-size:9px;color:#666;letter-spacing:2px;display:block;margin-bottom:6px;width:100%;max-width:320px}
</style>
</head>
<body>
<h1>PROTOCOL</h1>
<div class="sub">GITHUB AUTO-UPDATER</div>

<label>GITHUB TOKEN (paste each time)</label>
<input type="password" id="token-input" placeholder="ghp_...">

<label>NEW index.html CODE</label>
<textarea id="code-input" placeholder="Paste full contents here..."></textarea>

<button class="btn" id="push-btn" onclick="pushToGitHub()">PUSH TO GITHUB</button>
<button class="btn btn-sec" onclick="clearAll()">CLEAR</button>

<div class="status" id="status"></div>

<script>
var OWNER = 'lethalalbatross';
var REPO = 'Protocol';
var FILE = 'index.html';

function updateStatus(msg, type) {
  var el = document.getElementById('status');
  el.className = 'status show ' + (type || '');
  el.innerHTML = msg;
}

function clearAll() {
  document.getElementById('code-input').value = '';
  document.getElementById('token-input').value = '';
  document.getElementById('status').className = 'status';
  document.getElementById('status').innerHTML = '';
}

async function pushToGitHub() {
  var token = document.getElementById('token-input').value.trim();
  var code = document.getElementById('code-input').value.trim();

  if (!token) { updateStatus('Paste GitHub token first.', 'err'); return; }
  if (!code) { updateStatus('Paste index.html code first.', 'err'); return; }

  var btn = document.getElementById('push-btn');
  btn.disabled = true;
  btn.textContent = 'CONNECTING...';

  try {
    updateStatus('1/3 Fetching file info...', 'info');
    var url = 'https://api.github.com/repos/' + OWNER + '/' + REPO + '/contents/' + FILE;
    var getResp = await fetch(url, {
      headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json' }
    });

    if (!getResp.ok) {
      var et = await getResp.text();
      throw new Error('GET failed ' + getResp.status + ' - ' + et.substring(0, 100));
    }

    var fileData = await getResp.json();
    var sha = fileData.sha;
    updateStatus('1/3 SHA fetched<br>2/3 Encoding...', 'info');

    var encoded = btoa(unescape(encodeURIComponent(code)));
    updateStatus('1/3 SHA fetched<br>2/3 Encoded<br>3/3 Pushing...', 'info');

    var pushResp = await fetch(url, {
      method: 'PUT',
      headers: {
        'Authorization': 'token ' + token,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ message: 'Update via auto-updater', content: encoded, sha: sha })
    });

    if (!pushResp.ok) {
      var eb = await pushResp.text();
      throw new Error('PUT failed ' + pushResp.status + ' - ' + eb.substring(0, 100));
    }

    var result = await pushResp.json();
    var commitSha = result.commit.sha.substring(0, 8);
    updateStatus('PUSHED OK<br><br>Commit: ' + commitSha + '<br>Live in 60 seconds.', 'ok');
    btn.textContent = 'DONE';
    setTimeout(function() { btn.disabled = false; btn.textContent = 'PUSH TO GITHUB'; }, 5000);

  } catch (e) {
    updateStatus('Error: ' + e.message, 'err');
    btn.disabled = false;
    btn.textContent = 'PUSH TO GITHUB';
  }
}
</script>
</body>
</html>
